name: CI
on:
  pull_request:
  push:
    branches:
    - 'main'
jobs:
  test:
    name: Small tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make test
  perf:
    name: Run perf on CI env
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - run: make test-perf
  e2e:
    name: End-to-end tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make setup
        working-directory: e2e
      - run: make start
        working-directory: e2e
      - run: make test
        working-directory: e2e
